<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404  Page Not Found  SCTMS</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=Figtree:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FDFBF8;--nv:#0F1729;--nv2:#1B2340;--gd:#A07828;--gd2:#C49A32;--tx:#0F1729;--tx2:#5C6478;--tx3:rgba(15,23,41,0.28);--br:rgba(15,23,41,0.09);--sf:#fff}
body{background:var(--bg);color:var(--tx);font-family:'Figtree',sans-serif;min-height:100vh;display:flex;flex-direction:column}
nav{height:62px;display:flex;align-items:center;padding:0 40px;border-bottom:1px solid var(--br);background:rgba(253,251,248,0.95)}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-mark{width:26px;height:26px;border-radius:5px;background:var(--nv);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:.85rem;font-weight:700;color:#fff}
.logo-word{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;color:var(--nv);letter-spacing:2px;text-transform:uppercase}
.logo-word em{color:var(--gd2);font-style:normal}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px}
.wrap{text-align:center;max-width:500px;position:relative}
.big-num{font-family:'Fraunces',serif;font-size:11rem;font-weight:700;color:var(--nv);line-height:1;opacity:.05;position:absolute;left:50%;top:50%;transform:translate(-50%,-60%);pointer-events:none;letter-spacing:-8px}
.icon{font-size:4rem;display:block;margin-bottom:20px;animation:float 3s ease-in-out infinite;position:relative;z-index:1}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.tag{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px;position:relative;z-index:1}
h1{font-family:'Fraunces',serif;font-size:2.1rem;font-weight:600;color:var(--nv);margin-bottom:12px;letter-spacing:-.5px;position:relative;z-index:1}
p{font-size:.88rem;color:var(--tx2);line-height:1.75;margin-bottom:32px;font-weight:300;position:relative;z-index:1}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
.btn-p{padding:11px 26px;border-radius:8px;border:none;background:var(--nv);color:#fff;font-family:'Figtree',sans-serif;font-size:.86rem;font-weight:600;text-decoration:none;transition:all .18s;display:inline-block}
.btn-p:hover{background:var(--nv2)}
.btn-s{padding:11px 22px;border-radius:8px;border:1px solid var(--br);background:transparent;color:var(--tx2);font-family:'Figtree',sans-serif;font-size:.86rem;text-decoration:none;transition:all .18s;display:inline-block}
.btn-s:hover{border-color:var(--nv);color:var(--nv)}
.links{margin-top:40px;display:flex;gap:24px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
.qlink{font-size:.72rem;color:var(--tx3);text-decoration:none;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;transition:color .18s}
.qlink:hover{color:var(--nv)}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-mark">S</div>
    <div class="logo-word">SC<em>T</em>MS</div>
  </a>
</nav>
<main>
  <div class="wrap">
    <div class="big-num">404</div>
    <span class="icon"></span>
    <div class="tag">Error 404</div>
    <h1>This bus left without you.</h1>
    <p>The page you're looking for doesn't exist or was moved.<br>But don't worry  there are plenty more routes to explore.</p>
    <div class="btns">
      <a href="index.html" class="btn-p"> Back to Home</a>
      <a href="routes.html" class="btn-s">Browse Schedules</a>
    </div>
    <div class="links">
      <a href="login.html" class="qlink">Sign In</a>
      <a href="register.html" class="qlink">Register</a>
      <a href="dashboard.html" class="qlink">Dashboard</a>
      <a href="marketplace.html" class="qlink">Marketplace</a>
    </div>
  </div>
</main>
</body>
</html>
