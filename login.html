<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SCTMS sign in. Access your dashboard and manage bookings.">
<title>Sign In - SCTMS</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Figtree:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FDFBF8;--bg2:#F7F4EF;--bg3:#F0EDE6;--surface:#fff;
  --navy:#0F1729;--navy2:#1B2340;
  --gold:#A07828;--gold2:#C49A32;--gold-dim:rgba(160,120,40,0.07);
  --text:#0F1729;--text2:#5C6478;--text3:rgba(15,23,41,0.32);
  --border:rgba(15,23,41,0.09);--border2:rgba(160,120,40,0.22);
  --green:#2A7A4B;--red:#C0392B;
  --shadow:0 1px 3px rgba(15,23,41,0.05),0 4px 16px rgba(15,23,41,0.06);
  --shadow2:0 2px 8px rgba(15,23,41,0.07),0 20px 48px rgba(15,23,41,0.09);
}
body{background:var(--bg);color:var(--text);font-family:'Figtree','Noto Sans Bengali',sans-serif;min-height:100vh;display:flex}
button{font-family:inherit}
button:focus-visible,a:focus-visible{outline:2px solid var(--gold2);outline-offset:2px}

/* LEFT PANEL */
.left-panel{
  width:44%;flex-shrink:0;background:var(--navy);
  display:flex;flex-direction:column;padding:48px;
  position:relative;overflow:hidden;
}
.left-panel::before{
  content:'';position:absolute;top:-100px;right:-100px;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(160,120,40,0.1),transparent 70%);
}
.left-panel::after{
  content:'';position:absolute;bottom:-80px;left:-60px;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.03),transparent 70%);
}
.lp-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:auto}
.logo-mark{width:32px;height:32px;border-radius:7px;background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:#fff}
.logo-word{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:600;
  color:#fff;letter-spacing:2px;text-transform:uppercase}
.logo-word em{color:var(--gold2);font-style:normal}
.lp-content{position:relative;z-index:1;margin-bottom:auto}
.lp-tag{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:rgba(255,255,255,0.35);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.lp-title{font-family:'Fraunces',serif;font-size:2.6rem;font-weight:300;
  color:#fff;line-height:1.15;letter-spacing:-0.5px;margin-bottom:12px}
.lp-title strong{font-weight:700}
.lp-desc{font-size:0.84rem;color:rgba(255,255,255,0.45);line-height:1.8;font-weight:300;max-width:300px}
.lp-stats{display:flex;gap:28px;position:relative;z-index:1}
.lps-val{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;color:#fff;line-height:1;margin-bottom:3px}
.lps-label{font-family:'JetBrains Mono',monospace;font-size:0.54rem;color:rgba(255,255,255,0.3);
  text-transform:uppercase;letter-spacing:1.5px}

/* RIGHT PANEL */
.right-panel{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 40px;position:relative}
.form-box{width:100%;max-width:400px}
.lang-toggle{
  position:absolute;top:22px;right:26px;
  padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:#fff;color:var(--navy);font-size:0.78rem;cursor:pointer;
  transition:all 0.18s;font-family:'JetBrains Mono',monospace;letter-spacing:1px
}
.lang-toggle:hover{border-color:var(--navy);background:var(--bg2)}
.form-eyebrow{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text3);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.form-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:600;
  color:var(--navy);margin-bottom:6px;letter-spacing:-0.3px}
.form-sub{font-size:0.84rem;color:var(--text2);margin-bottom:32px;font-weight:300}
.form-sub a{color:var(--navy);font-weight:600;text-decoration:none}
.form-sub a:hover{text-decoration:underline}

.fg{margin-bottom:16px}
.fg label{display:block;font-family:'JetBrains Mono',monospace;font-size:0.56rem;
  text-transform:uppercase;letter-spacing:2px;color:var(--text2);margin-bottom:7px}
.fg input{
  width:100%;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:8px;padding:12px 14px;color:var(--navy);
  font-family:'Figtree',sans-serif;font-size:0.9rem;outline:none;transition:all 0.18s;
}
.fg input:focus{border-color:var(--navy);background:var(--surface);
  box-shadow:0 0 0 3px rgba(15,23,41,0.06)}
.fg-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.fg-row label{margin-bottom:0}
.forgot{font-size:0.72rem;color:var(--text2);text-decoration:none;transition:color 0.18s}
.forgot:hover{color:var(--navy)}

.btn-submit{
  width:100%;padding:13px;border-radius:8px;border:none;
  background:var(--navy);color:#fff;
  font-family:'Figtree',sans-serif;font-size:0.92rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;margin-top:4px;
}
.btn-submit:hover{background:var(--navy2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(15,23,41,0.18)}

.err-box{
  background:rgba(192,57,43,0.06);border:1px solid rgba(192,57,43,0.15);
  border-radius:7px;padding:10px 13px;color:var(--red);
  font-size:0.8rem;margin-bottom:14px;display:none;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.form-box>*{animation:fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both}
.form-box>*:nth-child(1){animation-delay:0.05s}
.form-box>*:nth-child(2){animation-delay:0.1s}
.form-box>*:nth-child(3){animation-delay:0.15s}
.form-box>*:nth-child(4){animation-delay:0.2s}

@media(max-width:860px){
  .left-panel{display:none}
  body{background:var(--bg)}
  .right-panel{padding:32px 24px;align-items:flex-start;padding-top:80px}
  .lang-toggle{top:18px;right:18px}
}
</style>
</head>
<body>

<div class="left-panel">
  <a href="index.html" class="lp-logo">
    <div class="logo-mark">S</div>
    <div class="logo-word">SC<em>T</em>MS</div>
  </a>
  <div class="lp-content">
    <div class="lp-tag" data-i18n="lp_tag">Smart City Transport</div>
    <div class="lp-title" data-i18n-html="lp_title">Travel Smart.<br><strong>Travel Far.</strong></div>
    <p class="lp-desc" data-i18n="lp_desc">Bangladesh's unified platform for seamless bus and train travel across every major city.</p>
  </div>
  <div class="lp-stats">
    <div><div class="lps-val">64+</div><div class="lps-label" data-i18n="stat_routes">Routes</div></div>
    <div><div class="lps-val">1.2M</div><div class="lps-label" data-i18n="stat_passengers">Passengers</div></div>
    <div><div class="lps-val">99%</div><div class="lps-label" data-i18n="stat_ontime">On-time</div></div>
  </div>
</div>

<div class="right-panel">
  <button class="lang-toggle" id="lang-toggle" type="button">বাংলা</button>
  <div class="form-box">
    <div class="form-eyebrow" data-i18n="welcome">Welcome back</div>
    <div class="form-title" data-i18n="sign_in">Sign In</div>
    <p class="form-sub" data-i18n-html="no_account">Don't have an account? <a href="register.html">Register here</a></p>

    <div class="err-box" id="err-box"></div>

    <div class="fg">
      <label data-i18n="email_label">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" data-i18n-placeholder="email_ph">
    </div>
    <div class="fg">
      <div class="fg-row">
        <label data-i18n="password_label">Password</label>
        <a href="forgot-password.html" class="forgot" data-i18n="forgot">Forgot password?</a>
      </div>
      <input type="password" id="password" placeholder="Enter your password" data-i18n-placeholder="password_ph">
    </div>

    <button class="btn-submit" onclick="login()" data-i18n="sign_in_btn">Sign In</button>

  </div>
</div>

<script>
const API = 'https://sctms-backend-neon.onrender.com/api';

const I18N = {
  en: {
    lp_tag: 'Smart City Transport',
    lp_title: 'Travel Smart.<br><strong>Travel Far.</strong>',
    lp_desc: 'Bangladesh\'s unified platform for seamless bus and train travel across every major city.',
    stat_routes: 'Routes',
    stat_passengers: 'Passengers',
    stat_ontime: 'On-time',
    welcome: 'Welcome back',
    sign_in: 'Sign In',
    no_account: 'Don\'t have an account? <a href="register.html">Register here</a>',
    email_label: 'Email Address',
    email_ph: 'you@example.com',
    password_label: 'Password',
    password_ph: 'Enter your password',
    forgot: 'Forgot password?',
    sign_in_btn: 'Sign In',
    err_required: 'Email and password are required.',
    err_server: 'Server error. Is the backend running?'
  },
  bn: {
    lp_tag: 'স্মার্ট সিটি ট্রান্সপোর্ট',
    lp_title: 'স্মার্টে ভ্রমণ।<br><strong>আরও দূর।</strong>',
    lp_desc: 'বাংলাদেশের প্রধান সব শহরের বাস ও ট্রেন যাত্রার এক প্ল্যাটফর্ম।',
    stat_routes: 'রুট',
    stat_passengers: 'যাত্রী',
    stat_ontime: 'সময়মতো',
    welcome: 'স্বাগতম',
    sign_in: 'সাইন ইন',
    no_account: 'অ্যাকাউন্ট নেই? <a href="register.html">রেজিস্টার করুন</a>',
    email_label: 'ইমেইল ঠিকানা',
    email_ph: 'you@example.com',
    password_label: 'পাসওয়ার্ড',
    password_ph: 'পাসওয়ার্ড লিখুন',
    forgot: 'পাসওয়ার্ড ভুলে গেছেন?',
    sign_in_btn: 'সাইন ইন',
    err_required: 'ইমেইল এবং পাসওয়ার্ড দিন।',
    err_server: 'সার্ভার সমস্যা। ব্যাকএন্ড চালু আছে?'
  }
};

let lang = localStorage.getItem('sctms_lang') || 'en';
function t(k){return (I18N[lang]&&I18N[lang][k])||I18N.en[k]||k;}
function applyLang(){
  document.documentElement.lang = lang === 'bn' ? 'bn' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent = t(el.getAttribute('data-i18n'));});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{el.setAttribute('placeholder', t(el.getAttribute('data-i18n-placeholder')));});
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{el.innerHTML = t(el.getAttribute('data-i18n-html'));});
  document.getElementById('lang-toggle').textContent = (lang==='en') ? 'বাংলা' : 'English';
}

function toggleLang(){
  lang = (lang === 'en') ? 'bn' : 'en';
  localStorage.setItem('sctms_lang', lang);
  applyLang();
}

applyLang();

async function login(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  const err=document.getElementById('err-box');
  err.style.display='none';
  if(!email||!pass){err.textContent=t('err_required');err.style.display='block';return;}
  try{
    const res=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const data=await res.json();
    if(!res.ok){err.textContent=data.message||'Login failed.';err.style.display='block';return;}
    localStorage.setItem('sctms_token',data.token);
    localStorage.setItem('sctms_user',JSON.stringify(data.user));
    const role = (data.user?.role || '').toLowerCase();
    window.location.href=(role==='admin' || role==='staff')?'dashboard-admin.html':'dashboard.html';
  }catch{err.textContent=t('err_server');err.style.display='block';}
}

document.getElementById('lang-toggle').addEventListener('click',toggleLang);
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
